name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  # ---------------------------------------------------------------
  # Job 1: Build C core library and CLI tools, run smoke test
  # ---------------------------------------------------------------
  build-c:
    name: C build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y gcc make cppcheck

      - name: Build iwordctl and iworduse
        working-directory: tool
        run: |
          cp -r ../include/* .
          # -Werror will be added after P2 (fix/security) is resolved.
          # Known warnings: NULL return in iword_mask(), operator precedence in iword_ischar(), etc.
          make all CFLAGS="-O2 -Wall -Wextra"

      - name: Static analysis (cppcheck)
        run: |
          cppcheck --enable=warning,performance,portability \
            --error-exitcode=1 \
            --suppress=variableScope \
            --suppress=invalidPointerCast \
            include/iword.c tool/iwordctl.c tool/iworduse.c

      - name: Smoke test - load and seek
        working-directory: tool
        run: |
          # Use a unique dict key to avoid SHM collisions between parallel jobs
          printf "apple\tA\nbanana\tA\nspam_word\t2\nadult_word\t1\n" > /tmp/test_dict.txt
          DICT_KEY="ci-${{ matrix.os }}-$$"
          ./iwordctl dict "${DICT_KEY}" load /tmp/test_dict.txt
          ./iwordctl dict "${DICT_KEY}" seek apple
          ./iwordctl dict "${DICT_KEY}" seek banana
          ./iwordctl dict "${DICT_KEY}" seek notexist || true
          ./iwordctl dict "${DICT_KEY}" status
          ./iwordctl dict "${DICT_KEY}" stop

      - name: Check SHM is cleaned up
        run: |
          # Warn if any SHM segments remain after the test
          ipcs -m | grep -v "^--\|^key\|^$" && echo "Warning: SHM segments remain" || echo "SHM clean"

  # ---------------------------------------------------------------
  # Job 2: Build PHP PECL extension (matrix)
  #   All versions (7.4-8.4) are expected to succeed after fix/php8-compat
  # ---------------------------------------------------------------
  build-php:
    name: PHP ${{ matrix.php }} build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        php:
          - "7.4"
          - "8.0"
          - "8.1"
          - "8.2"
          - "8.3"
          - "8.4"
        exclude:
          # PHP 7.4 is not available in the official repos for ubuntu-24.04
          - os: ubuntu-24.04
            php: "7.4"

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: phpize

      - name: Build PECL extension
        run: |
          mkdir temp_pecl
          cp -r pecl/* temp_pecl/
          mkdir temp_pecl/include
          cp -r include/* temp_pecl/include/
          cd temp_pecl
          phpize
          ./configure
          make -j$(nproc)
          echo "✅ PHP ${{ matrix.php }}: Build succeeded"

  # ---------------------------------------------------------------
  # Job 3: Python binding smoke test
  # ---------------------------------------------------------------
  build-python:
    name: Python binding (ubuntu-22.04)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y gcc make python3

      - name: Build C library
        run: make tool && make lib

      - name: Load dictionary and run binding tests
        run: |
          printf "apple\t9\nspam\t2\nadult_word\t1\n" > /tmp/dict.txt
          bin/iwordctl load /tmp/dict.txt
          python3 bindings/python/test_basic.py
          python3 bindings/python/test_langchain_integration.py
          bin/iwordctl stop

  # ---------------------------------------------------------------
  # Job 4: Go binding build and vet
  # ---------------------------------------------------------------
  build-go:
    name: Go binding (ubuntu-22.04)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y gcc make

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build C library
        run: make tool && make lib

      - name: Build and vet Go binding
        working-directory: bindings/go
        run: |
          go build .
          go vet .
          echo "Go binding build and vet passed"

      - name: Load dictionary and run Go tests
        run: |
          printf "free\t2\nspam\t2\nprize\t2\nadult_word\t1\napple\t9\n" > /tmp/dict.txt
          DICT_KEY="ci-go-$$"
          bin/iwordctl dict "${DICT_KEY}" load /tmp/dict.txt
          cd bindings/go && IWORD_TEST_KEY="${DICT_KEY}" go test -v ./...
          cd ../.. && bin/iwordctl dict "${DICT_KEY}" stop

  # ---------------------------------------------------------------
  # Job 5: Node.js binding smoke test
  # ---------------------------------------------------------------
  build-node:
    name: Node.js binding (ubuntu-22.04)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y gcc make

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build C library
        run: make tool && make lib

      - name: Build N-API addon
        working-directory: bindings/node
        run: npm run build

      - name: Load dictionary and run binding tests
        run: |
          printf "free\t2\nspam\t2\nprize\t2\nadult_word\t1\napple\t9\n" > /tmp/dict.txt
          bin/iwordctl load /tmp/dict.txt
          node bindings/node/test_basic.js
          bin/iwordctl stop

  # ---------------------------------------------------------------
  # Job 6: Summary — block merge if any build fails
  # ---------------------------------------------------------------
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [build-c, build-php, build-python, build-go, build-node]
    if: always()
    steps:
      - name: Check C build result
        run: |
          if [ "${{ needs.build-c.result }}" = "success" ]; then
            echo "✅ C core build: passed"
          else
            echo "❌ C core build: FAILED"
            exit 1
          fi
      - name: Check Python binding result
        run: |
          if [ "${{ needs.build-python.result }}" = "success" ]; then
            echo "✅ Python binding: passed"
          else
            echo "❌ Python binding: FAILED"
            exit 1
          fi
      - name: Check Go binding result
        run: |
          if [ "${{ needs.build-go.result }}" = "success" ]; then
            echo "✅ Go binding: passed"
          else
            echo "❌ Go binding: FAILED"
            exit 1
          fi
      - name: Check Node.js binding result
        run: |
          if [ "${{ needs.build-node.result }}" = "success" ]; then
            echo "✅ Node.js binding: passed"
          else
            echo "❌ Node.js binding: FAILED"
            exit 1
          fi
