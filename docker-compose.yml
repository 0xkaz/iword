version: "3.8"

services:
  # Development environment with all language runtimes
  dev:
    build: .
    image: iword:dev
    volumes:
      - .:/workspace
    working_dir: /workspace
    # SHM size for iWord dictionary (adjust based on dictionary size)
    shm_size: '256m'
    command: bash

  # CI-equivalent test runner (mirrors GitHub Actions build-c job)
  test-c:
    build: .
    image: iword:dev
    shm_size: '256m'
    command: >
      bash -c "
        cd tool && cp -r ../include/* . &&
        make clean && make all CFLAGS='-O2 -Wall -Wextra' &&
        printf 'apple\t9\nspam\t2\n' > /tmp/dict.txt &&
        ./iwordctl load /tmp/dict.txt &&
        ./iwordctl seek apple &&
        ./iwordctl --json seek apple &&
        ./iwordctl --json status &&
        ./iwordctl stop &&
        echo 'All tests passed'
      "

  # Python binding test
  test-python:
    build: .
    image: iword:dev
    shm_size: '256m'
    command: >
      bash -c "
        bin/iwordctl load /tmp/dict.txt &&
        python3 bindings/python/example_rag.py &&
        bin/iwordctl stop
      "
